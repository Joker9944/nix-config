name: nix-flake-update

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:

  nix-flake-update:

    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write

    runs-on: ubuntu-latest

    steps:

      - name: Repository Checkout
        id: git-checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup nix
        id: nix-setup
        uses: Joker9944/nix-config/.github/composites/nix-setup@main
        with:
          # cSpell:disable
          extra-conf: |
            extra-substituters = https://nix-community.cachix.org https://hyprland.cachix.org https://cache.nixos-cuda.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc= cache.nixos-cuda.org:74DUi4Ye579gUqzH4ziL9IyiJBlDpMRn9MBN8oNan9M
          # cSpell:enable

        # cSpell:ignore ghaction-import-gpg
      - name: GPG Config
        id: gpg-config
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0

        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Pre-update Build Count
        id: pre-build-count
        uses: Joker9944/nix-config/.github/composites/nix-count-derivations@main

      - name: Update Flakes
        id: nix-update
        shell: bash

        run: |
          mapfile -t flake_dirs < <(find . -name "flake.nix" -exec dirname {} + | sort -u)

          for flake_dir in "${flake_dirs[@]}"; do
            echo "Updating flake in: $flake_dir"
            nix flake update --flake "$flake_dir" --commit-lock-file --option commit-lock-file-summary "flake: update $flake_dir/flake.lock"
          done

      - name: Post-update Build Count
        id: post-build-count
        uses: Joker9944/nix-config/.github/composites/nix-count-derivations@main

      - name: Verify Build Count
        id: verify-build-count
        shell: bash

        run: |
          pre="${{ steps.pre-build-count.outputs.build_count }}"
          post="${{ steps.post-build-count.outputs.build_count }}"
          echo "Pre-update: ${pre} derivations to build"
          echo "Post-update: ${post} derivations to build"
          if [[ "${pre}" != "${post}" ]]; then
            echo "::warning::Build count changed (${pre} -> ${post}) — nixpkgs update may contain broken packages, skipping PR"
            echo "safe=false" >> "$GITHUB_OUTPUT"
          else
            echo "Build counts match — flake update looks healthy"
            echo "safe=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        id: git-pr-create
        if: ${{ steps.verify-build-count.outputs.safe == 'true' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1

        with:
          token: ${{ secrets.PAT }}
          branch: ci/nix-flake-update
          title: "flakes: update flake.lock"

      - name: Enable Automerge
        id: git-pr-automerge
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3.00

        if: ${{ steps.git-pr-create.outputs.pull-request-number }}

        with:
          token: ${{ secrets.PAT }}
          pull-request-number: ${{ steps.git-pr-create.outputs.pull-request-number }}
          merge-method: squash
