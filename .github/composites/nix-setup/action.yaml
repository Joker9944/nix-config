name: nix-setup

inputs:
  extra-conf:
    description: Extra nix.conf lines passed to the Determinate Nix installer
    required: false

runs:
  using: "composite"

  steps:
    - name: Install Determinate nix
      id: nix-install
      uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3.21.5
      with:
        extra-conf: ${{ inputs.extra-conf }}

    - name: Setup nix cache
      id: nix-cache
      uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
